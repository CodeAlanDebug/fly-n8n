# fly.toml app configuration file generated for n8n-run on 2025-06-23T17:20:53+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'n8n-run'
primary_region = 'ams'

# Pinned to an explicit version on purpose. A floating ':latest' here is what
# wedged the auto-deploy pipeline (the running image reported tag "latest",
# which broke version comparison). The GitHub Actions workflow overrides this
# per-deploy via `flyctl deploy --image n8nio/n8n:<version>`; this value is the
# backstop for any bare `flyctl deploy`. Never set it back to an untagged image.
[build]
  image = 'n8nio/n8n:2.27.3'

[http_service]
  internal_port = 5678
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2

[[mounts]]
  source = 'n8n_data'
  destination = '/home/node/.n8n'
