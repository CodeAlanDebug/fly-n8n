name: Auto-bump n8n version

# Detects new stable n8n releases and bumps the pinned image in fly.toml.
# It does NOT deploy directly. Fly.io's deploy-on-push trigger deploys whatever
# version is pinned in fly.toml, so this workflow's only job is to keep that pin
# current. One deployer (Fly), no race, and the running version is always an
# explicit tag (never the floating ':latest' that originally wedged the pipeline).
"on":
  # A push to main is what the Fly trigger deploys on; running here too lets us
  # re-pin if fly.toml was hand-edited to an untagged/older image.
  push:
    branches:
      - main

  # Daily check for new stable releases.
  schedule:
    - cron: '0 2 * * *'

  # Manual run from the Actions tab.
  workflow_dispatch:

concurrency:
  group: auto-bump-n8n
  cancel-in-progress: false

# Needs write access to commit the fly.toml bump back to main.
permissions:
  contents: write

jobs:
  check-and-bump:
    name: 🔍 Check for updates and bump fly.toml
    runs-on: ubuntu-latest

    # Pinned major version line for auto-bump.
    # The deployed instance runs n8n 2.x, so this is pinned to 2. The workflow
    # only auto-bumps minor/patch releases WITHIN this major (e.g. 2.13.x ->
    # 2.27.1). A newer major is reported but held for manual approval - bump
    # this number to move to the new major. NEVER lower it below the running
    # major: that would pin a downgrade the persisted database cannot survive.
    env:
      N8N_MAJOR: '2'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      # Detect the latest stable n8n version from Docker Hub.
      - name: 🔍 Detect latest n8n version from Docker Hub
        id: detect-version
        run: |
          source scripts/version-detection.sh

          echo "🔍 Querying Docker Hub for latest n8n version..."
          response=$(query_dockerhub_tags)
          if [ $? -ne 0 ]; then
            echo "❌ ERROR: Failed to query Docker Hub"
            exit 1
          fi

          # Keep only stable semantic versions (drops pre-releases and 'latest')
          stable=$(extract_tag_names "$response" | filter_stable_versions)

          # Highest stable overall, and the deploy target within the pinned major
          latest_overall=$(echo "$stable" | find_latest_version)
          latest_version=$(echo "$stable" | filter_major "$N8N_MAJOR" | find_latest_version)

          if [ -z "$latest_version" ]; then
            echo "❌ ERROR: Could not determine latest stable version in major $N8N_MAJOR"
            exit 1
          fi

          # Report (but never auto-bump to) a newer major held for approval
          held_major=""
          if [ -n "$latest_overall" ] && \
             [ "$(major_of "$latest_overall")" -gt "$N8N_MAJOR" ]; then
            held_major=$(major_of "$latest_overall")
            echo "⏸️  Newer major available: v$latest_overall (major $held_major)"
            echo "    Held for manual approval. Bump N8N_MAJOR to $held_major to upgrade."
          fi

          echo "✅ Latest stable in major $N8N_MAJOR: $latest_version"
          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT
          echo "latest_overall=$latest_overall" >> $GITHUB_OUTPUT
          echo "held_major=$held_major" >> $GITHUB_OUTPUT

      # Read the currently pinned version straight from fly.toml - the single
      # source of truth. No flyctl, no FLY_API_TOKEN, no ':latest' trap.
      - name: 📊 Read currently pinned version
        id: current-version
        run: |
          source scripts/version-detection.sh
          current_version=$(read_pinned_version "fly.toml")
          echo "📦 Currently pinned: ${current_version:-<untagged - will pin>}"
          echo "current_version=$current_version" >> $GITHUB_OUTPUT

      # Decide whether the pin needs to move.
      - name: ⚖️ Compare versions
        id: compare
        run: |
          source scripts/version-detection.sh
          current_version="${{ steps.current-version.outputs.current_version }}"
          latest_version="${{ steps.detect-version.outputs.latest_version }}"

          echo "📦 Pinned:  ${current_version:-untagged}"
          echo "🆕 Latest:  $latest_version"

          if needs_update "$current_version" "$latest_version"; then
            echo "🚀 Decision: BUMP NEEDED -> $latest_version"
            echo "needs_update=true" >> $GITHUB_OUTPUT
            log_version_check "$current_version" "$latest_version" "bump needed"
          else
            echo "✅ Decision: ALREADY PINNED TO LATEST"
            echo "needs_update=false" >> $GITHUB_OUTPUT
            log_version_check "$current_version" "$latest_version" "no bump needed"
          fi

      # Fetch release notes for the GitHub Actions summary (non-critical).
      - name: 📝 Fetch version update summary
        if: steps.compare.outputs.needs_update == 'true'
        continue-on-error: true
        run: |
          source scripts/version-detection.sh
          current_version="${{ steps.current-version.outputs.current_version }}"
          latest_version="${{ steps.detect-version.outputs.latest_version }}"
          if notes=$(fetch_release_notes "$latest_version") && [ -n "$notes" ]; then
            echo "✅ Fetched release notes for v${latest_version}"
            create_version_summary "$current_version" "$latest_version"
          else
            echo "⚠️ Release notes unavailable (non-critical)"
          fi

      # Bump fly.toml and push. The Fly deploy-on-push trigger does the deploy.
      # A push authored by GITHUB_TOKEN does NOT re-trigger this workflow (no
      # loop), but the Fly GitHub App still receives the push and deploys.
      - name: 🚀 Bump fly.toml and push
        if: steps.compare.outputs.needs_update == 'true'
        id: bump
        run: |
          source scripts/version-detection.sh
          latest_version="${{ steps.detect-version.outputs.latest_version }}"

          bump_flytoml_image "fly.toml" "$latest_version"
          echo "📌 Pinned fly.toml -> n8nio/n8n:$latest_version"
          grep -E "^[[:space:]]*image[[:space:]]*=" fly.toml

          if git diff --quiet -- fly.toml; then
            echo "ℹ️ fly.toml already at $latest_version, nothing to push"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fly.toml
          git commit \
            -m "chore: bump n8n to ${latest_version}" \
            -m "Auto-detected new stable release in major ${N8N_MAJOR}. Fly.io deploy-on-push trigger rolls this out."
          git push
          echo "pushed=true" >> $GITHUB_OUTPUT
          echo "🚀 Pushed - Fly.io will deploy n8nio/n8n:$latest_version"

      # Summary, always runs.
      - name: 📝 Create workflow summary
        if: always()
        run: |
          source scripts/version-detection.sh
          current_version="${{ steps.current-version.outputs.current_version }}"
          latest_version="${{ steps.detect-version.outputs.latest_version }}"
          needs_update="${{ steps.compare.outputs.needs_update }}"
          pushed="${{ steps.bump.outputs.pushed }}"

          if [ "$needs_update" = "true" ]; then
            if [ "$pushed" = "true" ]; then
              action="bumped to $latest_version (Fly.io deploying)"
            else
              action="bump needed but nothing pushed"
            fi
          else
            action="skipped - already pinned to latest"
          fi

          create_workflow_summary "$action" "$current_version" "$latest_version"

          held_major="${{ steps.detect-version.outputs.held_major }}"
          latest_overall="${{ steps.detect-version.outputs.latest_overall }}"
          if [ -n "$held_major" ] && [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo ""
              echo "> ⏸️ **Major upgrade held for manual approval:** v$latest_overall"
              echo "> (major $held_major). Auto-bump is pinned to major"
              echo "> \`$N8N_MAJOR\`. Bump \`N8N_MAJOR\` in the workflow to upgrade."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
